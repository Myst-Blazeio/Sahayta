services:
  - type: web
    name: fir-automation-backend
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --threads 4
    healthCheckPath: /api/health

    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false # Set manually in Render dashboard
      - key: RENDER_URL
        sync: false # Set to https://<your-app-name>.onrender.com
      - key: LOG_LEVEL
        value: info
